# ============================================================================
# MuleShield AI Prometheus Configuration
# Scrapes metrics from FastAPI backend and system components
# ============================================================================

global:
  scrape_interval: 15s          # Scrape targets every 15 seconds
  evaluation_interval: 15s      # Evaluate rules every 15 seconds
  scrape_timeout: 10s
  external_labels:
    cluster: 'muleshield-ai'
    environment: 'production'

# Alertmanager configuration (optional, for production)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets:
#           - alertmanager:9093

# Rule files for alerts (optional)
# rule_files:
#   - "/etc/prometheus/rules/*.yml"

# Scrape configurations
scrape_configs:
  # ============================================================================
  # MuleShield AI FastAPI Backend
  # ============================================================================
  - job_name: 'muleshield-backend'
    static_configs:
      - targets: ['backend:8000']
        labels:
          service: 'scoring-api'
          component: 'backend'
    metrics_path: '/metrics'
    scrape_interval: 15s
    scrape_timeout: 10s

  # ============================================================================
  # Prometheus Self-Monitoring
  # ============================================================================
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'prometheus'
          component: 'monitoring'

  # ============================================================================
  # Redis Exporter (optional - requires redis_exporter sidecar)
  # ============================================================================
  # - job_name: 'redis'
  #   static_configs:
  #     - targets: ['redis-exporter:9121']
  #       labels:
  #         service: 'redis'
  #         component: 'cache'

  # ============================================================================
  # Neo4j Metrics (optional - requires neo4j metrics plugin)
  # ============================================================================
  # - job_name: 'neo4j'
  #   static_configs:
  #     - targets: ['neo4j:2004']
  #       labels:
  #         service: 'neo4j'
  #         component: 'graph-db'

  # ============================================================================
  # MLflow (optional - if metrics exposed)
  # ============================================================================
  # - job_name: 'mlflow'
  #   static_configs:
  #     - targets: ['mlflow:5000']
  #       labels:
  #         service: 'mlflow'
  #         component: 'model-registry'

